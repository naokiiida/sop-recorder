<!DOCTYPE html>
<html>
<head><title>SOP Recorder Offscreen</title></head>
<body>
<script>
// Offscreen document for MediaRecorder (audio+video from tab capture).
// Inlined because Plasmo doesn't bundle offscreen documents automatically.

let mediaRecorder = null;
let chunks = [];
let stream = null;

chrome.runtime.onMessage.addListener((message, _sender, sendResponse) => {
  if (message.target !== "offscreen") return false;

  switch (message.type) {
    case "START_MEDIA_CAPTURE":
      handleStart(message.payload.streamId);
      sendResponse({ success: true });
      break;
    case "STOP_MEDIA_CAPTURE":
      handleStop();
      sendResponse({ success: true });
      break;
    case "PAUSE_MEDIA_CAPTURE":
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.pause();
      }
      sendResponse({ success: true });
      break;
    case "RESUME_MEDIA_CAPTURE":
      if (mediaRecorder && mediaRecorder.state === "paused") {
        mediaRecorder.resume();
      }
      sendResponse({ success: true });
      break;
  }
  return false;
});

async function handleStart(streamId) {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { mandatory: { chromeMediaSource: "tab", chromeMediaSourceId: streamId } },
      video: { mandatory: { chromeMediaSource: "tab", chromeMediaSourceId: streamId } }
    });

    chunks = [];

    const mimeType = MediaRecorder.isTypeSupported("video/webm; codecs=vp9,opus")
      ? "video/webm; codecs=vp9,opus"
      : "video/webm; codecs=vp8,opus";

    mediaRecorder = new MediaRecorder(stream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      const blob = new Blob(chunks, { type: mimeType });
      const buffer = await blob.arrayBuffer();
      chrome.runtime.sendMessage({
        type: "MEDIA_RECORDING_COMPLETE",
        payload: { data: Array.from(new Uint8Array(buffer)) }
      });
      cleanup();
    };

    mediaRecorder.start(1000);
    chrome.runtime.sendMessage({ type: "MEDIA_CAPTURE_READY" });
  } catch (err) {
    console.error("Offscreen: failed to start recording:", err);
    chrome.runtime.sendMessage({
      type: "MEDIA_CAPTURE_ERROR",
      payload: { error: String(err) }
    });
  }
}

function handleStop() {
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  } else {
    cleanup();
  }
}

function cleanup() {
  if (stream) {
    stream.getTracks().forEach((track) => track.stop());
    stream = null;
  }
  mediaRecorder = null;
  chunks = [];
}
</script>
</body>
</html>
